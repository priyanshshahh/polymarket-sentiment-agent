name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (Python ${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ["3.12"]
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r requirements.txt
      - name: Import smoke test
        run: python -c "from app.main import app; from app.database import init_db; init_db(); print('OK')"
      - name: Bayesian + heuristic sanity
        run: |
          python -c "
          from app.modules.intelligence import bayesian_update, _heuristic
          e = _heuristic('SEC approves Bitcoin ETF', 'big bullish news')
          assert e.sentiment == 'bullish', e
          p, lr = bayesian_update(0.5, e.sentiment, e.confidence)
          assert p > 0.5 and lr > 1, (p, lr)
          e2 = _heuristic('Major hack and lawsuit filed', 'fraud')
          assert e2.sentiment == 'bearish', e2
          p2, _ = bayesian_update(0.5, e2.sentiment, e2.confidence)
          assert p2 < 0.5, p2
          print('Sanity OK')
          "

  frontend:
    name: Frontend (Node 20)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run build

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: doa-agent:ci
