# Fly.io config for the DOA agent.

app = "doa-agent-priyansh"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8000"
  HOST = "0.0.0.0"
  TRADING_MODE = "PAPER"
  DATABASE_URL = "sqlite:////data/doa.db"
  FRONTEND_DIST = "/app/frontend_dist"

# Persistent volume keeps the SQLite DB across deploys/restarts.
[mounts]
  source = "doa_data"
  destination = "/data"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "15s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/healthz"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
