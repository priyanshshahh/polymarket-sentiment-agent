# Fly.io config for the DOA agent.
# Adjust `app` to whatever name `fly launch` gives you (must be unique on Fly).

app = "doa-agent"
primary_region = "iad"          # change to your preferred region

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8000"
  HOST = "0.0.0.0"
  TRADING_MODE = "PAPER"
  DATABASE_URL = "sqlite:////data/doa.db"
  FRONTEND_DIST = "/app/frontend_dist"

# Persistent volume keeps the SQLite DB across deploys/restarts.
[mounts]
  source = "doa_data"
  destination = "/data"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false    # never sleep — the agent loop must keep ticking
  auto_start_machines = true
  min_machines_running = 1

  [http_service.checks]
    [http_service.checks.healthz]
      type = "http"
      method = "GET"
      path = "/healthz"
      interval = "30s"
      timeout = "5s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
